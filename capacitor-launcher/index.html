<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lavoro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #081020;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            padding-top: max(2rem, env(safe-area-inset-top));
            padding-bottom: max(2rem, env(safe-area-inset-bottom));
        }

        .logo {
            width: 80px;
            height: 80px;
            background: #0f1f35;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            overflow: hidden;
        }

        .logo img {
            width: 56px;
            height: 56px;
            object-fit: contain;
        }

        .logo-fallback {
            font-size: 2rem;
            font-weight: 800;
            color: #3b82f6;
            letter-spacing: -0.04em;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .tagline {
            color: #334155;
            font-size: 0.875rem;
            margin-bottom: 3rem;
        }

        /* Connecting state */
        #status-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #0f1f35;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text {
            color: #475569;
            font-size: 0.875rem;
        }

        /* Setup form */
        #setup-screen {
            display: none;
            flex-direction: column;
            gap: 0.625rem;
            width: 100%;
            max-width: 360px;
        }

        label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0d1b2e;
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 1rem;
            outline: none;
            -webkit-appearance: none;
            transition: border-color 0.15s;
        }

        input:focus { border-color: #3b82f6; }
        input::placeholder { color: #1e3a5f; }

        .error {
            color: #f87171;
            font-size: 0.8rem;
            display: none;
            padding-left: 0.25rem;
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.25rem;
            -webkit-appearance: none;
            transition: opacity 0.15s;
        }

        button:active { opacity: 0.8; }

        /* Footer hint — shows stored URL, tap 3× to reset */
        .footer {
            position: fixed;
            bottom: max(1.25rem, env(safe-area-inset-bottom));
            color: #0f1f35;
            font-size: 0.65rem;
            text-align: center;
            cursor: pointer;
            padding: 0.5rem 1.5rem;
            user-select: none;
            -webkit-user-select: none;
            transition: color 0.2s;
        }

        .footer.visible { color: #1e3a5f; }
    </style>
</head>
<body>

    <div class="logo">
        <img src="icons/icon-192.png" alt="" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'logo-fallback',textContent:'L'}))">
    </div>

    <h1>Lavoro</h1>
    <p class="tagline">Servicebeheer</p>

    <div id="status-screen">
        <div class="spinner"></div>
        <p class="status-text" id="status-text">Verbinden met server…</p>
    </div>

    <div id="setup-screen">
        <label for="url-input">Serveradres</label>
        <input
            type="text"
            id="url-input"
            placeholder="https://lavoro.mijnbedrijf.nl"
            autocapitalize="none"
            autocorrect="off"
            autocomplete="off"
            spellcheck="false"
        >
        <p class="error" id="error-msg">Voer een geldig adres in (bijv. https://lavoro.mijnbedrijf.nl)</p>
        <button onclick="connect()">Verbinden</button>
    </div>

    <div class="footer" id="footer" onclick="handleFooterTap()"></div>

    <script>
        const KEY = 'lavoro_server_url';
        let tap_count = 0;
        let tap_timer = null;
        let redirect_timer = null;

        function normalise(raw) {
            raw = raw.trim().replace(/\/+$/, '');
            if (raw && !/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
            return raw;
        }

        function is_valid(url) {
            try {
                const u = new URL(url);
                return u.protocol === 'https:' || u.protocol === 'http:';
            } catch { return false; }
        }

        function show_setup(prefill) {
            clearTimeout(redirect_timer);
            document.getElementById('status-screen').style.display = 'none';
            const s = document.getElementById('setup-screen');
            s.style.display = 'flex';
            if (prefill) document.getElementById('url-input').value = prefill;
            setTimeout(() => document.getElementById('url-input').focus(), 100);
        }

        function connect() {
            const url = normalise(document.getElementById('url-input').value);
            const err = document.getElementById('error-msg');
            if (!is_valid(url)) { err.style.display = 'block'; return; }
            err.style.display = 'none';
            localStorage.setItem(KEY, url);
            navigate(url);
        }

        function navigate(url) {
            window.location.href = url;
        }

        function handleFooterTap() {
            tap_count++;
            clearTimeout(tap_timer);
            tap_timer = setTimeout(() => { tap_count = 0; }, 1500);
            if (tap_count >= 3) {
                tap_count = 0;
                show_setup(localStorage.getItem(KEY) || '');
            }
        }

        document.getElementById('url-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') connect();
        });

        // Boot
        const stored = localStorage.getItem(KEY);

        if (stored) {
            document.getElementById('status-screen').style.display = 'flex';
            const footer = document.getElementById('footer');
            footer.textContent = stored;
            footer.classList.add('visible');
            redirect_timer = setTimeout(() => navigate(stored), 800);
        } else {
            show_setup(null);
        }
    </script>
</body>
</html>
